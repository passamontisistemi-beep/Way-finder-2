<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WayFinder Sardegna - Test Borghi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#dfe7ee;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

#app{
width:min(100vw,390px);
aspect-ratio:9/16;
background:#fff;
border-radius:28px;
overflow:hidden;
display:flex;
flex-direction:column;
}

/* HEADER */
#header img{width:100%}

#topBar{
padding:8px;
text-align:center;
font-weight:800;
font-size:13px;
}

/* MAP */
#mapWrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* BUTTON */
#plusBtn{
position:absolute;
top:60px;
right:12px;
width:60px;
height:60px;
border-radius:50%;
background:red;
color:#fff;
font-size:38px;
z-index:2000;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* PANEL */
#poiPanel{
position:absolute;
top:80px;
left:10px;
right:10px;
background:#fff;
border-radius:16px;
display:none;
max-height:55%;
overflow:auto;
z-index:999;
padding:10px;
}

.poiItem{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
font-weight:600;
}

/* CARD */
#detailCard{
position:absolute;
top:25%;
left:10px;
right:10px;
background:#fff;
border-radius:16px;
padding:12px;
display:none;
z-index:1000;
}
.btn{width:100%;padding:10px;margin-top:6px}

/* FOOTER */
footer{
height:110px;
background:#111;
color:#fff;
text-align:center;
}

.rss{height:26px;overflow:hidden;}
.track{animation:scroll 30s linear infinite;}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.brand{
font-size:16px;
font-weight:900;
}

/* POPUP */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

.popup{
background:#fff;
padding:20px;
border-radius:16px;
text-align:center;
}

.hidden{display:none}
</style>
</head>

<body>

<div id="app">

<!-- GPS -->
<div id="gpsModal" class="overlay">
<div class="popup">
<h3>Consenti GPS</h3>
<button onclick="enableGPS()">Consenti</button>
</div>
</div>

<!-- RAGGIO -->
<div id="radiusModal" class="overlay hidden">
<div class="popup">
<p>Seleziona raggio</p>
<input type="range" min="1" max="200" value="50" id="radius">
<p><span id="radiusValue">50</span> km</p>
<button onclick="startApp()">Avvia</button>
</div>
</div>

<div id="header">
<img src="header-wayfinder.png">
</div>

<div id="topBar">
BORGI entro <span id="raggioTxt">--</span> KM
</div>

<div id="mapWrap">

<div id="map"></div>

<button id="plusBtn">+</button>

<div id="poiPanel">
<div id="poiList"></div>
</div>

</div>

<div id="detailCard">
<h3 id="poiTitle"></h3>
<button class="btn" id="wikiBtn">Wikipedia</button>
<button class="btn" id="goBtn">Come arrivare</button>
<button class="btn" onclick="closeCard()">Chiudi</button>
</div>

<footer>
<div class="rss"><div class="track">Borghi storici della Sardegna ✦ Turismo culturale</div></div>
<div class="rss"><div class="track">📞 112 ✦ 📞 118 ✦ 📞 INFOPOINT</div></div>
<div class="brand"><b>PASSAMONTI</b>_COMMUNICATION</div>
</footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map=L.map("map").setView([40,9],8);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let userLat=40,userLng=9;
let poiLayer=L.layerGroup().addTo(map);

/* 🔥 15 BORGHI REALI */
let poiData=[
{name:"Lollove",lat:40.365,lon:9.3324},
{name:"Tempio Pausania",lat:40.9,lon:9.1},
{name:"Aggius",lat:40.93,lon:8.98},
{name:"Atzara",lat:39.99,lon:9.07},
{name:"Bosa",lat:40.3,lon:8.5},
{name:"Carloforte",lat:39.14,lon:8.3},
{name:"Galtellì",lat:40.39,lon:9.61},
{name:"Laconi",lat:39.85,lon:9.05},
{name:"La Maddalena",lat:41.21,lon:9.41},
{name:"Oliena",lat:40.27,lon:9.4},
{name:"Posada",lat:40.63,lon:9.72},
{name:"Sadali",lat:39.82,lon:9.27},
{name:"Sardara",lat:39.62,lon:8.82},
{name:"Gavoi",lat:40.16,lon:9.2},
{name:"Castelsardo",lat:40.92,lon:8.71}
];

/* GPS */
function enableGPS(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
document.getElementById("gpsModal").classList.add("hidden");
document.getElementById("radiusModal").classList.remove("hidden");
});
}

/* SLIDER */
document.getElementById("radius").oninput=function(){
document.getElementById("radiusValue").innerText=this.value;
}

/* START */
function startApp(){
let r=document.getElementById("radius").value;
document.getElementById("raggioTxt").innerText=r;
document.getElementById("radiusModal").classList.add("hidden");

drawUser();
loadPOI();
}

/* USER */
function drawUser(){
L.circleMarker([userLat,userLng],{
radius:12,
color:"red",
fillColor:"red",
fillOpacity:1
}).addTo(map).bindPopup("TU SEI QUI").openPopup();

map.setView([userLat,userLng],10);
}

/* POI */
function loadPOI(){

poiLayer.clearLayers();
document.getElementById("poiList").innerHTML="";

poiData.forEach(p=>{

let m=L.circleMarker([p.lat,p.lon],{
radius:10,
color:"#000",
weight:2,
fillColor:"orange",
fillOpacity:1
}).addTo(poiLayer);

m.on("click",()=>openDetail(p));

let row=document.createElement("div");
row.className="poiItem";
row.innerText=p.name;

row.onclick=function(){
map.setView([p.lat,p.lon],13);
};

document.getElementById("poiList").appendChild(row);

});
}

/* CARD */
function openDetail(p){
document.getElementById("poiTitle").innerText=p.name;

document.getElementById("wikiBtn").onclick=function(){
window.open("https://it.wikipedia.org/wiki/"+encodeURIComponent(p.name));
};

document.getElementById("goBtn").onclick=function(){
window.open(`https://www.google.com/maps/dir/${userLat},${userLng}/${p.lat},${p.lon}`);
};

document.getElementById("detailCard").style.display="block";
}

function closeCard(){
document.getElementById("detailCard").style.display="none";
}

document.getElementById("plusBtn").onclick=function(){
let p=document.getElementById("poiPanel");
p.style.display=(p.style.display==="block")?"none":"block";
};

</script>

</body>
</html>
